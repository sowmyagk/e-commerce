<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-box">

  
  <div class="offer">
    <img src="https://cdn.fcglcdn.com/brainbees/images/m/login_revamp_banner_mobile.webp" alt="offer"/>
  </div>

  <div class="login-box">
        <h2>Log In / Register</h2>

        <label>Email-Id or Mobile No*</label>
        <input type="text" placeholder="Enter your Email-Id or Mobile No*">

        <button class="btn">CONTINUE</button>

        <p class="register">New user? <a href="#">Register Here</a></p>

        <p class="or">Or login with</p>

     <div class="google-btn">
            <img src="https://img.icons8.com/color/20/google-logo.png" alt="offer"/>
        </div>

        <p class="terms">
            By continuing, you agree to Terms of Use & Privacy Policy
        </p>
    </div>

</div>

</body>
</html>
